<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FoN DS Predictor - Professional</title>
    <style>
        :root { --win: #27ae60; --loss: #e74c3c; --accent: #f1c40f; --bg: #121212; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 1000px; }
        
        .panel { background: #222; padding: 20px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        
        /* Physical Table Layout */
        .table-container { display: flex; justify-content: center; margin: 20px 0; perspective: 1000px; }
        .zero { width: 50px; background: #27ae60; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid #555; border-radius: 5px 0 0 5px; }
        .grid { display: grid; grid-template-rows: repeat(3, 50px); grid-auto-flow: column; background: #333; border: 1px solid #555; border-radius: 0 5px 5px 0; }
        .cell { width: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border: 0.1px solid #444; }
        .cell:hover { filter: brightness(1.5); background: #444; }
        .red { background: #b92b27; }
        .black { background: #1a1a1a; }

        /* Logic Display */
        .prediction-header { font-size: 1.1em; color: #aaa; margin-bottom: 5px; }
        .prediction-val { font-size: 2.5em; color: var(--accent); font-weight: 800; letter-spacing: 2px; }
        .neighbors-box { background: #111; padding: 10px; border-radius: 5px; color: #0f0; font-family: monospace; min-height: 20px; margin-top: 10px; border-left: 3px solid var(--accent); }
        
        textarea { width: 100%; height: 50px; background: #000; color: #888; border: 1px solid #444; padding: 10px; border-radius: 4px; font-size: 12px; }
        button { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        .history-strip { font-size: 0.8em; color: #666; margin-top: 10px; overflow-x: auto; white-space: nowrap; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <strong>Bulk History Sync:</strong>
        <textarea id="bulkInput" placeholder="Paste history here..."></textarea>
        <button onclick="syncHistory()">Sync Numbers</button>
    </div>

    <div class="table-container">
        <div class="zero" onclick="handleInput(0)">0</div>
        <div class="grid" id="rouletteGrid"></div>
    </div>

    <div class="panel" style="text-align: center;">
        <div id="statusTag"></div>
        <div class="prediction-header">NEXT PREDICTION (SINGLE DS)</div>
        <div id="predictionDisplay" class="prediction-val">--</div>
        
        <div style="text-align: left; margin-top: 20px;">
            <strong>Collected Neighbors (Ascending Order):</strong>
            <div id="neighborDisplay" class="neighbors-box">None collected yet</div>
        </div>
        
        <div class="history-strip" id="historyView">History: </div>
    </div>
</div>

<script>
    const fonMap = {
        0:[5], 1:[6], 2:[7], 3:[8], 4:[9], 5:[0,10,15], 6:[1], 7:[2], 8:[3], 9:[4], 10:[5],
        11:[16,24,29], 12:[17,21,26], 13:[18,31,36], 14:[19], 15:[10], 16:[11], 17:[12,21,26], 18:[13,31,36],
        19:[14], 20:[25], 21:[12,17,26], 22:[27], 23:[28,32], 24:[29], 25:[20], 26:[12,21,17], 27:[22],
        28:[23,32], 29:[24], 30:[35], 31:[18,33,36], 32:[28,23], 33:[33], 34:[34], 35:[30], 36:[13,18,31]
    };
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    
    let history = [];
    let currentDS = null;

    // Create Physical Table (3 rows)
    const grid = document.getElementById('rouletteGrid');
    // Standard layout: Row 1 (3,6,9..), Row 2 (2,5,8..), Row 3 (1,4,7..)
    const rowNumbers = [
        [3,6,9,12,15,18,21,24,27,30,33,36],
        [2,5,8,11,14,17,20,23,26,29,32,35],
        [1,4,7,10,13,16,19,22,25,28,31,34]
    ];

    rowNumbers.forEach(row => {
        row.forEach(num => {
            const cell = document.createElement('div');
            cell.className = `cell ${reds.includes(num) ? 'red' : 'black'}`;
            cell.textContent = num;
            cell.onclick = () => handleInput(num);
            grid.appendChild(cell);
        });
    });

    function getDS(n) { return n === 0 ? null : Math.ceil(n / 6); }

    function syncHistory() {
        const val = document.getElementById('bulkInput').value;
        history = val.split(/[\s,]+/).map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        updateView();
        alert("History updated with " + history.length + " entries.");
    }

    function handleInput(num) {
        const hitDS = getDS(num);
        const status = document.getElementById('statusTag');

        // Check Win/Loss
        if (currentDS) {
            if (hitDS === currentDS) {
                status.innerHTML = '<span style="color:var(--win); font-weight:bold;">WIN! RESETTING</span>';
            } else {
                status.innerHTML = '<span style="color:var(--loss); font-weight:bold;">LOSS! UPDATING DS</span>';
            }
        }

        history.push(num);
        
        // FOE Logic: Get neighbors for current number AND its equivalents
        let equivalents = fonMap[num] || [];
        let targets = [num, ...equivalents];
        let rawNeighbors = [];

        for (let i = 0; i < history.length; i++) {
            if (targets.includes(history[i])) {
                if (i > 0) rawNeighbors.push(history[i-1]);
                if (i < history.length - 1) rawNeighbors.push(history[i+1]);
            }
        }

        // Show Neighbors in Ascending Order
        const sortedNeighbors = [...rawNeighbors].sort((a, b) => a - b);
        document.getElementById('neighborDisplay').textContent = 
            sortedNeighbors.length > 0 ? sortedNeighbors.join(', ') : "No neighbors found yet";

        // Predict Majority Double Street
        if (rawNeighbors.length > 0) {
            let counts = {};
            rawNeighbors.forEach(n => {
                let ds = getDS(n);
                if (ds) counts[ds] = (counts[ds] || 0) + 1;
            });

            // Set currentDS to the winner of the count
            let bestDS = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, null);
            currentDS = parseInt(bestDS);
        }

        updateView();
    }

    function updateView() {
        document.getElementById('predictionDisplay').textContent = currentDS ? `DS ${currentDS}` : "--";
        document.getElementById('historyView').textContent = "History: " + history.slice(-20).join(', ');
    }
</script>

</body>
</html>
