<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Sector-in-Sector Tracker (Dual Zone Pro)</title>
    <style>
        :root { --green: #27ae60; --red: #c0392b; --black: #1a1a1a; --gold: #f1c40f; --blue: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; margin: 20px; }
        .container { max-width: 1300px; margin: auto; }
        
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; flex: 1; min-width: 350px; }

        /* Board Styling */
        .board { display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px; margin-top: 15px; }
        .cell { height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; 
                font-weight: bold; border-radius: 4px; border: 1px solid #444; user-select: none; }
        .n0 { background: var(--green); grid-row: span 3; }
        .nRed { background: var(--red); }
        .nBlack { background: var(--black); }
        
        /* Prediction Styling */
        .prediction-container { display: flex; gap: 15px; margin-top: 10px; }
        .prediction-area { background: linear-gradient(145deg, #252525, #1a1a1a); padding: 15px; border-radius: 15px; text-align: center; flex: 1; }
        .primary-border { border: 2px solid var(--gold); }
        .remaining-border { border: 2px solid var(--blue); }
        
        .target-num { font-size: 3.5rem; font-weight: 900; line-height: 1; margin: 10px 0; }
        .gold-text { color: var(--gold); }
        .blue-text { color: var(--blue); }
        
        .sector-list { color: #888; font-family: monospace; word-spacing: 5px; background: #000; padding: 10px; border-radius: 5px; font-size: 0.9rem; }
        
        textarea { width: 100%; height: 60px; background: #000; color: var(--green); border: 1px solid #444; margin-top: 10px; padding: 5px; font-family: monospace; resize: none; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #333; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #444; }

        .streak-container { display: flex; justify-content: space-around; margin-top: 10px; background: #111; padding: 8px; border-radius: 8px; font-size: 0.85rem; }
        .streak-win { color: var(--green); font-weight: bold; }
        .streak-loss { color: var(--red); font-weight: bold; }

        .log-box { font-size: 0.8rem; color: #aaa; background: #111; padding: 10px; border-radius: 5px; margin-top: 15px; border-left: 3px solid var(--gold); }
        .recent-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; min-height: 35px; align-items: center; }
        .chip { padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 0.9rem; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--gold); margin-bottom: 5px;">Layered Sector Tracker (Pro Version)</h2>
    <p style="margin-top: 0; color: #888;">Complete Sector Separation & Streak Tracking</p>

    <div class="flex-row">
        <div class="panel">
            <h3>Add Last Result</h3>
            <div id="board" class="board">
                <div class="cell n0" onclick="inputResult(0)">0</div>
            </div>
            <textarea id="bulk" placeholder="Paste history here (LATEST number at the TOP)...&#10;10&#10;32&#10;15"></textarea>
            <button onclick="importBulk()">Process History</button>
            
            <h4 style="margin-bottom: 5px; margin-top: 20px;">Last 10 Spins (Latest Left)</h4>
            <div id="recentHistory" class="recent-chips">
                <span style="color:#666; font-size:0.85rem;">No spins tracked yet.</span>
            </div>
        </div>

        <div class="panel">
            <h3>Calculated Targets</h3>
            <div id="display-container" class="prediction-container">
                <div class="prediction-area" style="border: 1px dashed #444; color: #666; width: 100%;">
                    Waiting for data entry...
                </div>
            </div>
            
            <div id="logicPath" class="log-box">
                Logic trail will appear here after calculation.
            </div>
        </div>
    </div>
</div>

<script>
    const WHEEL = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    
    // Internal state: history[0] is oldest, history[history.length-1] is the newest/latest roll.
    let history = []; 

    // Streak systems
    let primaryStreak = { currentWin: 0, currentLoss: 0, maxWin: 0, maxLoss: 0 };
    let remainingStreak = { currentWin: 0, currentLoss: 0, maxWin: 0, maxLoss: 0 };

    // Initialize UI Board
    const board = document.getElementById('board');
    const rows = [[3,6,9,12,15,18,21,24,27,30,33,36],[2,5,8,11,14,17,20,23,26,29,32,35],[1,4,7,10,13,16,19,22,25,28,31,34]];
    rows.forEach(r => r.forEach(n => {
        board.innerHTML += `<div class="cell ${REDS.includes(n)?'nRed':'nBlack'}" onclick="inputResult(${n})">${n}</div>`;
    }));

    function inputResult(n) {
        // Step-by-step simulation to correctly build streaks chronologically
        updateStreaksBeforeNewSpin(n);
        history.push(n);
        processLogic();
    }

    function importBulk() {
        const val = document.getElementById('bulk').value;
        // Parse numbers. If latest is at the top, array[0] is latest.
        let nums = val.split(/[ ,\n]+/).map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        
        // Reverse it so that oldest goes in first, keeping history order correct
        nums.reverse(); 

        nums.forEach(n => {
            updateStreaksBeforeNewSpin(n);
            history.push(n);
        });

        if(history.length > 0) processLogic();
        document.getElementById('bulk').value = '';
    }

    function getSector15(center) {
        let idx = WHEEL.indexOf(center);
        let sector = [];
        for (let i = -7; i <= 7; i++) {
            sector.push(WHEEL[(idx + i + 37) % 37]);
        }
        return sector;
    }

    function calculateSectorWinRate(sectorNumbers, historyUntilNow = history) {
        if (historyUntilNow.length === 0) return 0;
        let wins = historyUntilNow.filter(num => sectorNumbers.includes(num)).length;
        return (wins / historyUntilNow.length) * 100;
    }

    // Runs a historical check before adding the new number to check if the previous calculation won
    function updateStreaksBeforeNewSpin(newNum) {
        if (history.length === 0) return;
        
        // Use the current logic state (which relies on history up to this exact moment)
        let lastNum = history[history.length - 1];
        let primaryZone = getSector15(lastNum);

        // Calculate what the predictions WERE for this upcoming spin
        let bestPrimaryCenter = primaryZone[0];
        let highestPrimaryWinRate = -1;
        primaryZone.forEach(candidate => {
            let candidateSector = getSector15(candidate);
            let winRate = calculateSectorWinRate(candidateSector);
            if (winRate > highestPrimaryWinRate) { closest = candidate; highestPrimaryWinRate = winRate; bestPrimaryCenter = candidate; }
        });
        let activePrimarySector = getSector15(bestPrimaryCenter);

        let bestRemainingCenter = -1;
        let highestRemainingWinRate = -1;
        WHEEL.forEach(candidate => {
            let candidateSector = getSector15(candidate);
            // Rule: None of the numbers in this candidate's 15-number sector can exist in the active primary sector
            let overlaps = candidateSector.some(num => activePrimarySector.includes(num));
            if (!overlaps) {
                let winRate = calculateSectorWinRate(candidateSector);
                if (winRate > highestRemainingWinRate) {
                    highestRemainingWinRate = winRate;
                    bestRemainingCenter = candidate;
                }
            }
        });
        let activeRemainingSector = bestRemainingCenter !== -1 ? getSector15(bestRemainingCenter) : [];

        // Check Primary Performance
        if (activePrimarySector.includes(newNum)) {
            primaryStreak.currentWin++;
            primaryStreak.currentLoss = 0;
            if (primaryStreak.currentWin > primaryStreak.maxWin) primaryStreak.maxWin = primaryStreak.currentWin;
        } else {
            primaryStreak.currentLoss++;
            primaryStreak.currentWin = 0;
            if (primaryStreak.currentLoss > primaryStreak.maxLoss) primaryStreak.maxLoss = primaryStreak.currentLoss;
        }

        // Check Remaining Performance
        if (activeRemainingSector.length > 0 && activeRemainingSector.includes(newNum)) {
            remainingStreak.currentWin++;
            remainingStreak.currentLoss = 0;
            if (remainingStreak.currentWin > remainingStreak.maxWin) remainingStreak.maxWin = remainingStreak.currentWin;
        } else {
            remainingStreak.currentLoss++;
            remainingStreak.currentWin = 0;
            if (remainingStreak.currentLoss > remainingStreak.maxLoss) remainingStreak.maxLoss = remainingStreak.currentLoss;
        }
    }

    function processLogic() {
        let lastNum = history[history.length - 1];
        
        // 1. Primary Target Zone Setup
        let primaryZone = getSector15(lastNum);
        let bestPrimaryCenter = primaryZone[0];
        let highestPrimaryWinRate = -1;

        primaryZone.forEach(candidate => {
            let candidateSector = getSector15(candidate);
            let winRate = calculateSectorWinRate(candidateSector);
            if (winRate > highestPrimaryWinRate) {
                highestPrimaryWinRate = winRate;
                bestPrimaryCenter = candidate;
            }
        });
        let finalPrimarySector = getSector15(bestPrimaryCenter);

        // 2. Remaining Scan Setup (Must not contain ANY of finalPrimarySector's numbers)
        let bestRemainingCenter = null;
        let highestRemainingWinRate = -1;

        WHEEL.forEach(candidate => {
            let candidateSector = getSector15(candidate);
            // Strict modification: Ensure candidate's entire predicted area has zero overlaps with the Actual Prediction Area
            let hasOverlap = candidateSector.some(num => finalPrimarySector.includes(num));
            
            if (!hasOverlap) {
                let winRate = calculateSectorWinRate(candidateSector);
                if (winRate > highestRemainingWinRate) {
                    highestRemainingWinRate = winRate;
                    bestRemainingCenter = candidate;
                }
            }
        });
        
        let finalRemainingSector = bestRemainingCenter !== null ? getSector15(bestRemainingCenter) : [];

        render(lastNum, bestPrimaryCenter, highestPrimaryWinRate, finalPrimarySector, bestRemainingCenter, highestRemainingWinRate, finalRemainingSector);
    }

    function render(last, pBest, pRate, pSector, rBest, rRate, rSector) {
        const dispContainer = document.getElementById('display-container');
        const path = document.getElementById('logicPath');
        const recentBox = document.getElementById('recentHistory');

        // Render Cards
        dispContainer.innerHTML = `
            <div class="prediction-area primary-border">
                <div style="font-size:0.85rem; color:var(--gold); font-weight:bold;">ACTUAL PREDICTION AREA</div>
                <div class="target-num gold-text">${pBest}</div>
                <div style="margin-bottom:10px">Sector Strength: <strong>${pRate.toFixed(1)}%</strong></div>
                <div class="sector-list">${pSector.join(' ')}</div>
                <div class="streak-container">
                    <div>Streak: <span class="${primaryStreak.currentWin > 0 ? 'streak-win':'streak-loss'}">${primaryStreak.currentWin > 0 ? 'W' + primaryStreak.currentWin : 'L' + primaryStreak.currentLoss}</span></div>
                    <div>Max: <span class="streak-win">W${primaryStreak.maxWin}</span> / <span class="streak-loss">L${primaryStreak.maxLoss}</span></div>
                </div>
            </div>
            
            <div class="prediction-area remaining-border">
                <div style="font-size:0.85rem; color:var(--blue); font-weight:bold;">REMAINING WHEEL PREDICTION</div>
                <div class="target-num blue-text">${rBest !== null ? rBest : 'N/A'}</div>
                <div style="margin-bottom:10px">Sector Strength: <strong>${rBest !== null ? rRate.toFixed(1) + '%' : '0.0%'}</strong></div>
                <div class="sector-list">${rBest !== null ? rSector.join(' ') : 'No valid isolated sector'}</div>
                <div class="streak-container">
                    <div>Streak: <span class="${remainingStreak.currentWin > 0 ? 'streak-win':'streak-loss'}">${remainingStreak.currentWin > 0 ? 'W' + remainingStreak.currentWin : 'L' + remainingStreak.currentLoss}</span></div>
                    <div>Max: <span class="streak-win">W${remainingStreak.maxWin}</span> / <span class="streak-loss">L${remainingStreak.maxLoss}</span></div>
                </div>
            </div>
        `;

        // Render Log
        path.innerHTML = `
            <strong>Logic Trail:</strong><br>
            • Last Hit: <b>${last}</b><br>
            • <b>Actual Prediction:</b> Center <b>${pBest}</b> chosen inside ${last}'s neighborhood.<br>
            • <b>Remaining Wheel Filtering:</b> All 15 numbers in the Actual Prediction Area were blacklisted. Scanned remaining options to isolate a clean, high-density 15-number setup.<br>
            • <b>Resulting Choice:</b> Selected 15-number sector centered at <b>${rBest}</b>.
        `;

        // Render Last 10 Results (Latest on Left)
        recentBox.innerHTML = '';
        let recent = [...history].reverse().slice(0, 10);
        recent.forEach(n => {
            let bg = n === 0 ? 'var(--green)' : (REDS.includes(n) ? 'var(--red)' : 'var(--black)');
            recentBox.innerHTML += `<span class="chip" style="background:${bg}; color:#fff">${n}</span>`;
        });
    }
</script>

</body>
</html>
