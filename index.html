<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FoN Roulette - 3DS Progression</title>
    <style>
        :root { --win: #27ae60; --loss: #e74c3c; --accent: #f1c40f; --bg: #121212; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 1000px; }
        
        .panel { background: #222; padding: 20px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Custom Table Layout */
        .table-container { display: flex; justify-content: center; margin: 20px 0; }
        .zero { width: 60px; background: #27ae60; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid #555; border-radius: 5px 0 0 5px; }
        .grid { display: grid; grid-template-rows: repeat(3, 50px); grid-auto-flow: column; background: #333; border: 1px solid #555; border-radius: 0 5px 5px 0; }
        .cell { width: 65px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border: 1px solid #444; }
        .cell:hover { filter: brightness(1.4); background: #444; }
        .red { background: #b92b27; }
        .black { background: #1a1a1a; }

        /* Logic & UI */
        .stat-row { display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 20px; }
        .unit-box { background: #333; border: 1px solid var(--accent); padding: 10px 20px; border-radius: 5px; font-size: 1.5em; min-width: 120px; text-align: center; }
        .prediction-val { font-size: 2.2em; color: var(--accent); font-weight: 800; text-shadow: 0 0 10px rgba(241, 196, 15, 0.2); }
        .neighbors-area { background: #000; padding: 12px; border-radius: 5px; color: #0f0; font-family: 'Courier New', monospace; border-left: 4px solid var(--accent); margin-top: 10px; }
        
        textarea { width: 100%; height: 50px; background: #000; color: #888; border: 1px solid #444; padding: 10px; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <strong>History Importer:</strong>
        <textarea id="bulkInput" placeholder="Paste results here (comma or space separated)"></textarea>
        <button style="margin-top:10px" onclick="syncHistory()">Sync Results</button>
    </div>

    <div class="table-container">
        <div class="zero" onclick="handleInput(0)">0</div>
        <div class="grid" id="rouletteGrid"></div>
    </div>

    <div class="panel">
        <div class="stat-row">
            <div>
                <strong>Unit Progression:</strong>
                <div id="unitDisplay" class="unit-box">1 Unit</div>
            </div>
            <div style="text-align: center;">
                <strong>Next 3 Double Streets:</strong>
                <div id="predictionDisplay" class="prediction-val">-- -- --</div>
            </div>
        </div>
        
        <div id="statusTag" style="text-align: center; margin: 15px 0; font-weight: bold; height: 20px;"></div>

        <div style="margin-top: 15px;">
            <strong>Sorted Neighbors in History:</strong>
            <div id="neighborDisplay" class="neighbors-area">Waiting for input...</div>
        </div>
    </div>
</div>

<script>
    // FoN Mapping
    const fonMap = {
        0:[5], 1:[6], 2:[7], 3:[8], 4:[9], 5:[0,10,15], 6:[1], 7:[2], 8:[3], 9:[4], 10:[5],
        11:[16,24,29], 12:[17,21,26], 13:[18,31,36], 14:[19], 15:[10], 16:[11], 17:[12,21,26], 18:[13,31,36],
        19:[14], 20:[25], 21:[12,17,26], 22:[27], 23:[28,32], 24:[29], 25:[20], 26:[12,21,17], 27:[22],
        28:[23,32], 29:[24], 30:[35], 31:[18,33,36], 32:[28,23], 33:[33], 34:[34], 35:[30], 36:[13,18,31]
    };
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    
    let history = [];
    let currentPredictions = [];
    let currentUnits = 1;

    // Table Generation: Row 1 (1,4,7...), Row 2 (2,5,8...), Row 3 (3,6,9...)
    const grid = document.getElementById('rouletteGrid');
    const tableLayout = [
        [1,4,7,10,13,16,19,22,25,28,31,34],
        [2,5,8,11,14,17,20,23,26,29,32,35],
        [3,6,9,12,15,18,21,24,27,30,33,36]
    ];

    tableLayout.forEach(row => {
        row.forEach(num => {
            const cell = document.createElement('div');
            cell.className = `cell ${reds.includes(num) ? 'red' : 'black'}`;
            cell.textContent = num;
            cell.onclick = () => handleInput(num);
            grid.appendChild(cell);
        });
    });

    function getDS(n) { return n === 0 ? null : Math.ceil(n / 6); }

    function syncHistory() {
        const val = document.getElementById('bulkInput').value;
        history = val.split(/[\s,]+/).map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        updateUI();
        alert("Synced " + history.length + " numbers.");
    }

    function handleInput(num) {
        const hitDS = getDS(num);
        const status = document.getElementById('statusTag');

        // 1. Progression: Loss +1, Win -1
        if (currentPredictions.length > 0) {
            if (currentPredictions.includes(hitDS)) {
                status.innerHTML = `<span style="color:var(--win)">WIN! Unit Level Down</span>`;
                currentUnits = Math.max(1, currentUnits - 1);
            } else {
                status.innerHTML = `<span style="color:var(--loss)">LOSS! Unit Level Up</span>`;
                currentUnits += 1;
            }
        }

        history.push(num);
        
        // 2. Neighbor Logic for Number + Equivalents
        let equivalents = fonMap[num] || [];
        let targets = [num, ...equivalents];
        let foundNeighbors = [];

        for (let i = 0; i < history.length; i++) {
            if (targets.includes(history[i])) {
                if (i > 0) foundNeighbors.push(history[i-1]);
                if (i < history.length - 1) foundNeighbors.push(history[i+1]);
            }
        }

        // 3. Display Neighbors (Ascending)
        const sorted = [...foundNeighbors].sort((a, b) => a - b);
        document.getElementById('neighborDisplay').textContent = sorted.length ? sorted.join(', ') : "None";

        // 4. Determine Top 3 Double Streets
        if (foundNeighbors.length > 0) {
            let counts = {};
            foundNeighbors.forEach(n => {
                let ds = getDS(n);
                if (ds) counts[ds] = (counts[ds] || 0) + 1;
            });

            currentPredictions = Object.keys(counts)
                .map(Number)
                .sort((a, b) => counts[b] - counts[a])
                .slice(0, 3);
        }

        updateUI();
    }

    function updateUI() {
        document.getElementById('unitDisplay').textContent = `${currentUnits} Unit${currentUnits > 1 ? 's' : ''}`;
        document.getElementById('predictionDisplay').textContent = 
            currentPredictions.length ? currentPredictions.map(d => `DS${d}`).join(' ') : "-- -- --";
    }
</script>

</body>
</html>
