<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dealer Signature Tracker</title>
    <style>
        :root { --bg: #0b0f19; --panel: #161e2d; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .dashboard { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        
        /* THE ACTUAL ROULETTE TABLE */
        .table-section { background: #064e3b; padding: 20px; border-radius: 15px; border: 4px solid #065f46; position: relative; overflow-x: auto; }
        .roulette-board { display: flex; align-items: stretch; min-width: 800px; }
        
        .zero-container { width: 70px; background: var(--green); border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; cursor: pointer; border-top-left-radius: 40px; border-bottom-left-radius: 40px; margin-right: 5px; }
        
        .numbers-grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(3, 1fr); gap: 3px; flex-grow: 1; }
        .cell { height: 60px; border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.1s; border-radius: 2px; }
        .cell:hover { filter: brightness(1.3); border-color: white; }
        .cell:active { transform: scale(0.95); }
        .r { background: var(--red); }
        .b { background: var(--black); }

        /* Panels */
        .panel { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid #2d3748; }
        .prediction-hero { text-align: center; background: #0f172a; border: 2px solid var(--accent); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        #target-display { font-size: 3rem; font-weight: 800; color: #fbbf24; line-height: 1.1; margin: 10px 0; }
        
        /* Neighbors Visualizer */
        .neighbors-box { display: flex; justify-content: center; gap: 4px; margin: 12px 0; overflow-x: auto; padding: 5px 0; }
        .nb-cell { width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; border: 1px solid rgba(255,255,255,0.2); }
        .nb-center { border: 2px solid #fbbf24; transform: scale(1.15); box-shadow: 0 0 10px rgba(251,191,36,0.4); }
        
        /* Streak Badges */
        .streak-container { display: flex; justify-content: center; gap: 6px; margin-top: 12px; }
        .streak-badge { width: 26px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #fff; }
        .badge-win { background: var(--green); }
        .badge-loss { background: var(--red); }
        .badge-empty { background: #334155; opacity: 0.4; }

        .log-wrap { height: 350px; overflow-y: auto; margin-top: 15px; border-radius: 8px; background: #0b0f19; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #1e293b; padding: 12px; position: sticky; top: 0; text-align: center; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #2d3748; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: #0b0f19; }
        .btn-danger { background: #7f1d1d; color: white; }
        
        .bulk-area { width: 100%; height: 60px; background: #0b0f19; color: var(--accent); border: 1px solid #475569; border-radius: 6px; padding: 10px; box-sizing: border-box; }
        .trend-up { color: #4ade80; } .trend-down { color: #f87171; }
    </style>
</head>
<body>

<div class="dashboard">
    <div>
        <div class="table-section">
            <h2 style="margin:0 0 15px 0; font-size: 1rem; opacity: 0.8;">LIVE ROULETTE INPUT</h2>
            <div class="roulette-board">
                <div class="zero-container" onclick="track(0)">0</div>
                <div class="numbers-grid" id="boardGrid"></div>
            </div>
        </div>

        <div class="panel" style="margin-top: 20px;">
            <h2 style="margin:0; font-size: 1rem;">SESSION LOG</h2>
            <div class="log-wrap">
                <table>
                    <thead>
                        <tr><th>Spin</th><th>Result</th><th>Distance</th><th>Momentum</th><th>Sector Verdict</th></tr>
                    </thead>
                    <tbody id="logTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div>
        <div class="prediction-hero">
            <div style="font-size: 0.75rem; letter-spacing: 1px; opacity: 0.6;">PREDICTED SECTOR (7+1+7)</div>
            <div id="target-display">--</div>
            
            <div class="neighbors-box" id="neighbors-output"></div>

            <div id="trend-text" style="font-weight: bold; font-size: 0.9rem; margin-bottom: 8px;">NEED 3+ SPINS</div>
            
            <div style="font-size: 0.7rem; opacity: 0.5; margin-top: 10px; border-top: 1px solid #334155; padding-top: 8px;">LAST 8 SPINS STREAK</div>
            <div class="streak-container" id="streak-output"></div>
        </div>

        <div class="panel">
            <h2 style="margin:0; font-size: 1rem;">SIGNATURE ANALYTICS</h2>
            <div style="margin: 15px 0;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>Avg. Distance (Last 14):</span>
                    <span id="avg-val" style="color:var(--accent); font-weight:bold;">0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Total Sample:</span>
                    <span id="count-val">0</span>
                </div>
            </div>
            
            <textarea id="bulkData" class="bulk-area" placeholder="Paste history (e.g. 32, 15, 19, 4)"></textarea>
            <button class="btn btn-primary" onclick="importHistory()">IMPORT DATA</button>
            <button class="btn btn-danger" onclick="resetSession()">RESET ALL</button>
        </div>
    </div>
</div>

<script>
    const wheelOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    
    let history = [];
    let dists = [];
    let predictedSectorsLog = []; 
    let outcomesLog = []; 

    function buildBoard() {
        const grid = document.getElementById('boardGrid');
        const rows = [
            [3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36],
            [2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35],
            [1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31, 34]
        ];

        rows.forEach(rowArr => {
            rowArr.forEach(n => {
                const cell = document.createElement('div');
                cell.className = `cell ${reds.includes(n) ? 'r' : 'b'}`;
                cell.innerText = n;
                cell.onclick = () => track(n);
                grid.appendChild(cell);
            });
        });
    }

    function get7Neighbors(centerNumber) {
        if(centerNumber === null || centerNumber === undefined) return [];
        let idx = wheelOrder.indexOf(centerNumber);
        let sector = [];
        for (let i = -7; i <= 7; i++) {
            let targetIdx = (idx + i + 37) % 37;
            sector.push(wheelOrder[targetIdx]);
        }
        return sector;
    }

    function track(num) {
        let currentActivePredictionSector = predictedSectorsLog.length > 0 ? predictedSectorsLog[predictedSectorsLog.length - 1] : [];

        if (currentActivePredictionSector.length > 0) {
            if (currentActivePredictionSector.includes(num)) {
                outcomesLog.push("W");
            } else {
                outcomesLog.push("L");
            }
        } else {
            outcomesLog.push(null); 
        }

        if (history.length > 0) {
            const lastNum = history[history.length - 1];
            const travel = (wheelOrder.indexOf(num) - wheelOrder.indexOf(lastNum) + 37) % 37;
            dists.push(travel);
        }
        
        history.push(num);
        process();
    }

    function importHistory() {
        const raw = document.getElementById('bulkData').value;
        const nums = raw.split(/[\s,]+/).map(Number).filter(n => !isNaN(n) && n >= 0 && n <= 36);
        nums.forEach(n => track(n));
        document.getElementById('bulkData').value = '';
    }

    function process() {
        if (history.length < 2) {
            predictedSectorsLog.push([]);
            return updateUI();
        }

        // Slice only the last 14 distance markers for signature mapping
        const recentDists = dists.slice(-14);
        const avg = recentDists.reduce((a, b) => a + b, 0) / recentDists.length;
        
        const lastD = dists[dists.length - 1];
        const prevD = dists.length > 1 ? dists[dists.length - 2] : lastD;

        let trend = "STABLE";
        let offset = 0;

        if (lastD > prevD) {
            trend = "RISING ↑"; 
            offset = 1;
        } else if (lastD < prevD) {
            trend = "DYING ↓";
            offset = -1;
        }

        const lastIdx = wheelOrder.indexOf(history[history.length - 1]);
        const predIdx = (lastIdx + Math.round(avg) + offset + 37) % 37;
        const targetCenter = wheelOrder[predIdx];
        
        const targetSector = get7Neighbors(targetCenter);
        predictedSectorsLog.push(targetSector);

        updateUI(targetCenter, avg, trend, targetSector);
    }

    function updateUI(prediction = "--", avg = 0, trend = "STABLE", targetSector = []) {
        document.getElementById('target-display').innerText = prediction;
        document.getElementById('avg-val').innerText = avg.toFixed(2);
        document.getElementById('count-val').innerText = history.length;
        
        const trendEl = document.getElementById('trend-text');
        trendEl.innerText = trend;
        trendEl.className = trend.includes("↑") ? "trend-up" : (trend.includes("↓") ? "trend-down" : "");

        const neighborsBox = document.getElementById('neighbors-output');
        neighborsBox.innerHTML = '';
        if (targetSector.length > 0) {
            targetSector.forEach((num, index) => {
                const colorClass = num === 0 ? 'var(--green)' : (reds.includes(num) ? 'var(--red)' : 'var(--black)');
                const isCenter = index === 7 ? 'nb-center' : '';
                neighborsBox.innerHTML += `<div class="nb-cell ${isCenter}" style="background: ${colorClass};">${num}</div>`;
            });
        }

        const streakBox = document.getElementById('streak-output');
        streakBox.innerHTML = '';
        const validOutcomes = outcomesLog.filter(o => o !== null);
        const lastEight = validOutcomes.slice(-8);
        
        for (let i = 0; i < 8; i++) {
            if (i < lastEight.length) {
                const outcome = lastEight[i];
                const badgeClass = outcome === 'W' ? 'badge-win' : 'badge-loss';
                streakBox.innerHTML += `<div class="streak-badge ${badgeClass}">${outcome}</div>`;
            } else {
                streakBox.innerHTML += `<div class="streak-badge badge-empty">-</div>`;
            }
        }

        const tbody = document.getElementById('logTable');
        tbody.innerHTML = '';
        
        history.slice().reverse().forEach((n, i) => {
            const actualIdx = history.length - 1 - i;
            const distance = dists[actualIdx - 1] ?? "-";
            
            let status = "-";
            if (actualIdx > 1) {
                status = dists[actualIdx-1] > dists[actualIdx-2] ? '<span class="trend-up">RISE</span>' : '<span class="trend-down">FALL</span>';
            }
            
            let outcomeVerdict = '<span style="opacity: 0.4;">-</span>';
            if (outcomesLog[actualIdx] !== null && outcomesLog[actualIdx] !== undefined) {
                outcomeVerdict = outcomesLog[actualIdx] === 'W' 
                    ? '<span class="trend-up" style="font-weight:bold;">HIT (WIN)</span>' 
                    : '<span class="trend-down">MISS (LOSS)</span>';
            }

            tbody.innerHTML += `<tr>
                <td>${actualIdx + 1}</td>
                <td><b>${n}</b></td>
                <td>${distance}</td>
                <td>${status}</td>
                <td>${outcomeVerdict}</td>
            </tr>`;
        });
    }

    function resetSession() {
        history = []; 
        dists = [];
        predictedSectorsLog = [];
        outcomesLog = [];
        updateUI();
    }

    buildBoard();
</script>
</body>
</html>
