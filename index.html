<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auto-Roulette Constant Speed Displacement Tracker</title>
    <style>
        :root { --green: #27ae60; --red: #c0392b; --black: #1a1a1a; --gold: #f1c40f; --blue: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; margin: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; flex: 1; min-width: 350px; }

        /* Board Styling */
        .board { display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px; margin-top: 15px; }
        .cell { height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; 
                font-weight: bold; border-radius: 4px; border: 1px solid #444; }
        .n0 { background: var(--green); grid-row: span 3; }
        .nRed { background: var(--red); }
        .nBlack { background: var(--black); }
        
        /* Prediction Styling */
        .prediction-area { background: linear-gradient(145deg, #1c2833, #111b24); border: 2px solid var(--gold); 
                           padding: 20px; border-radius: 15px; text-align: center; margin-top: 10px; }
        .target-num { font-size: 4rem; color: var(--gold); font-weight: 900; line-height: 1; margin: 10px 0; }
        .sector-list { color: #888; font-family: monospace; word-spacing: 5px; background: #000; padding: 10px; border-radius: 5px; font-size: 0.9rem; }
        
        /* Streak Styling */
        .streak-container { margin-bottom: 15px; display: flex; justify-content: center; gap: 5px; }
        .streak-item { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .win { background: var(--green); color: white; }
        .loss { background: var(--red); color: white; }

        textarea { width: 100%; height: 50px; background: #000; color: var(--green); border: 1px solid #444; margin-top: 10px; padding: 5px; font-family: monospace; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #333; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #444; }

        .log-box { font-size: 0.8rem; color: #aaa; background: #111; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 3px solid var(--blue); }
        
        /* Tracking Log Display Elements */
        .recent-display-container { margin-top: 15px; background: #111; padding: 12px; border-radius: 6px; border: 1px solid #2a2a2a; }
        .recent-display-title { font-size: 0.85rem; color: #888; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .recent-chips-wrapper { display: flex; gap: 6px; flex-wrap: wrap; }
        .recent-chip { min-width: 28px; height: 28px; padding: 0 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--gold);">Auto-Roulette Rotor Displacement Tracker</h2>

    <div class="flex-row">
        <div class="panel">
            <h3>Add Last Result</h3>
            <div id="board" class="board">
                <div class="cell n0" onclick="inputResult(0)">0</div>
            </div>
            <textarea id="bulk" placeholder="Paste initial window (Top is latest, e.g. 40-50 spins)..."></textarea>
            <button onclick="importBulk()">Analyze Mechanical Signature</button>
            
            <div class="recent-display-container">
                <div class="recent-display-title">Latest 10 Results (Newest → Oldest)</div>
                <div id="recentChips" class="recent-chips-wrapper">
                    <span style="color:#666; font-size:0.85rem; font-style:italic;">No spins recorded yet</span>
                </div>
            </div>
            <button onclick="clearTracker()" style="background: var(--red); margin-top: 15px;">Reset Tracking Target</button>
        </div>

        <div class="panel">
            <h3>Velocity-Based Prediction</h3>
            <div id="display" class="prediction-area">
                <p>Waiting for baseline velocity analysis...</p>
            </div>
            
            <div id="logicPath" class="log-box">
                Displacement tracking path calculations will compile here.
            </div>
        </div>
    </div>
</div>

<script>
    // Ordered European Wheel Profile layout map
    const WHEEL = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    
    const MAX_ROLLING_HISTORY = 70; 
    const MAX_STREAKS = 10;         

    let history = []; // Index 0 is always latest
    let streaks = []; 
    let lastPredictedSector = [];

    // Initialize UI Board
    const board = document.getElementById('board');
    const rows = [[3,6,9,12,15,18,21,24,27,30,33,36],[2,5,8,11,14,17,20,23,26,29,32,35],[1,4,7,10,13,16,19,22,25,28,31,34]];
    rows.forEach(r => r.forEach(n => {
        board.innerHTML += `<div class="cell ${REDS.includes(n)?'nRed':'nBlack'}" onclick="inputResult(${n})">${n}</div>`;
    }));

    function inputResult(n) {
        checkWinLoss(n);
        history.unshift(n); 
        
        if (history.length > MAX_ROLLING_HISTORY) {
            history.pop();
        }

        updateRecentChipsDisplay();
        processDisplacementLogic(n);
    }

    function importBulk() {
        const val = document.getElementById('bulk').value;
        const nums = val.split(/[ ,]+/).map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        
        if (nums.length === 0) return;

        // Loop array in chronological order (oldest to newest) to populate correctly
        for (let i = nums.length - 1; i >= 0; i--) {
            const n = nums[i];
            checkWinLoss(n);
            history.unshift(n);
            
            if (history.length > MAX_ROLLING_HISTORY) {
                history.pop();
            }
        }
        
        updateRecentChipsDisplay();
        if(history.length >= 2) {
            processDisplacementLogic(history[0]);
        }
        document.getElementById('bulk').value = '';
    }

    function checkWinLoss(newNum) {
        if (lastPredictedSector.length > 0) {
            const isWin = lastPredictedSector.includes(newNum);
            streaks.push(isWin ? "W" : "L");
            if (streaks.length > MAX_STREAKS) streaks.shift(); 
        }
    }

    function getSector(center) {
        let idx = WHEEL.indexOf(center);
        let sector = [];
        for (let i = -7; i <= 7; i++) {
            sector.push(WHEEL[(idx + i + 37) % 37]);
        }
        return sector;
    }

    // --- NEW MECHANICAL DISPLACEMENT CALCULATOR ---
    function processDisplacementLogic(lastNum) {
        if (history.length < 2) {
            document.getElementById('display').innerHTML = `<p>Data initialized. Awaiting next live spin to map displacement tracking...</p>`;
            return;
        }

        // 1. Calculate historical step displacement frequencies
        let displacementCounts = {};
        
        // Loop backward through history to calculate step distances between chronological items
        for (let i = history.length - 2; i >= 0; i--) {
            let prevNum = history[i + 1];
            let currentNum = history[i];
            
            let prevIdx = WHEEL.indexOf(prevNum);
            let currIdx = WHEEL.indexOf(currentNum);
            
            // Absolute forward pocket steps calculation
            let displacement = (currIdx - prevIdx + 37) % 37;
            
            displacementCounts[displacement] = (displacementCounts[displacement] || 0) + 1;
        }

        // 2. Identify the highest recurring target distance profile
        let optimalDisplacement = -1;
        let maxCount = -1;

        Object.keys(displacementCounts).forEach(disp => {
            if (displacementCounts[disp] > maxCount) {
                maxCount = displacementCounts[disp];
                optimalDisplacement = parseInt(disp);
            }
        });

        // 3. Project the optimal jump path forward from the last hit number location
        let lastNumIdx = WHEEL.indexOf(lastNum);
        let targetCenterIdx = (lastNumIdx + optimalDisplacement) % 37;
        let predictedCenter = WHEEL[targetCenterIdx];

        // 4. Generate playing zone target mapping (Center + 7 neighbors)
        let finalPredictionSector = getSector(predictedCenter);
        lastPredictedSector = finalPredictionSector;

        // Calculate exact visual appearance strength percentage based on the data points analyzed
        let strengthPct = (maxCount / (history.length - 1)) * 100;

        renderDisplacement(lastNum, predictedCenter, optimalDisplacement, strengthPct, finalPredictionSector);
    }

    function updateRecentChipsDisplay() {
        const wrapper = document.getElementById('recentChips');
        if (history.length === 0) {
            wrapper.innerHTML = `<span style="color:#666; font-size:0.85rem; font-style:italic;">No spins recorded yet</span>`;
            return;
        }

        const latest10 = history.slice(0, 10);
        let htmlStr = "";
        latest10.forEach(num => {
            let bgColor = "var(--black)";
            if (num === 0) bgColor = "var(--green)";
            else if (REDS.includes(num)) bgColor = "var(--red)";
            htmlStr += `<span class="recent-chip" style="background:${bgColor};">${num}</span>`;
        });
        wrapper.innerHTML = htmlStr;
    }

    function clearTracker() {
        history = []; streaks = []; lastPredictedSector = [];
        document.getElementById('display').innerHTML = `<p>Waiting for baseline velocity analysis...</p>`;
        document.getElementById('logicPath').innerHTML = `Displacement tracking path calculations will compile here.`;
        updateRecentChipsDisplay();
    }

    function renderDisplacement(last, best, displacementSteps, rate, sector) {
        const disp = document.getElementById('display');
        const path = document.getElementById('logicPath');

        let streakHtml = `<div class="streak-container">`;
        streaks.forEach(s => {
            streakHtml += `<span class="streak-item ${s === 'W' ? 'win' : 'loss'}">${s}</span>`;
        });
        streakHtml += `</div>`;

        disp.innerHTML = `
            ${streakHtml}
            <div style="font-size:0.9rem; color:var(--gold); font-weight:bold; letter-spacing:0.5px;">PROJECTED DISPLACEMENT CENTER</div>
            <div class="target-num">${best}</div>
            <div style="margin-bottom:10px">Mechanical Sync Density: <strong>${rate.toFixed(1)}%</strong></div>
            <div class="sector-list">${sector.join(' ')}</div>
        `;

        path.innerHTML = `
            <strong>Displacement Diagnostic:</strong><br>
            • Last Ball Pocket: <b>${last}</b> (Wheel Index Location: ${WHEEL.indexOf(last)})<br>
            • Core Velocity Baseline Signature: <b>+${displacementSteps} pockets</b> forward.<br>
            • Target Sector Focus: Centered directly around pocket <b>${best}</b>.<br>
            • <b>Execution:</b> Place coverage zone across 7 neighbors left and right.
        `;
    }
</script>

</body>
</html>
