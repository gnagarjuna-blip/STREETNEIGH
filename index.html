<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Sector-in-Sector Tracker (15-Num Zones)</title>
    <style>
        :root { --green: #27ae60; --red: #c0392b; --black: #1a1a1a; --gold: #f1c40f; --blue: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; margin: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; flex: 1; min-width: 350px; }

        /* Board Styling */
        .board { display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px; margin-top: 15px; }
        .cell { height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; 
                font-weight: bold; border-radius: 4px; border: 1px solid #444; }
        .n0 { background: var(--green); grid-row: span 3; }
        .nRed { background: var(--red); }
        .nBlack { background: var(--black); }
        
        /* Prediction Styling */
        .prediction-container { display: flex; gap: 15px; margin-top: 10px; }
        .prediction-area { background: linear-gradient(145deg, #252525, #1a1a1a); padding: 15px; border-radius: 15px; text-align: center; flex: 1; }
        .primary-border { border: 2px solid var(--gold); }
        .remaining-border { border: 2px solid var(--blue); }
        
        .target-num { font-size: 3.5rem; font-weight: 900; line-height: 1; margin: 10px 0; }
        .gold-text { color: var(--gold); }
        .blue-text { color: var(--blue); }
        
        .sector-list { color: #888; font-family: monospace; word-spacing: 5px; background: #000; padding: 10px; border-radius: 5px; font-size: 0.9rem; }
        
        textarea { width: 100%; height: 50px; background: #000; color: var(--green); border: 1px solid #444; margin-top: 10px; padding: 5px; font-family: monospace; resize: none; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #333; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #444; }

        .log-box { font-size: 0.8rem; color: #aaa; background: #111; padding: 10px; border-radius: 5px; margin-top: 15px; border-left: 3px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--gold); margin-bottom: 5px;">Layered Sector Tracker</h2>
    <p style="margin-top: 0; color: #888;">7+1+7 Neighbor Sector vs Remaining 22 Wheel Numbers Scan</p>

    <div class="flex-row">
        <div class="panel">
            <h3>Add Last Result</h3>
            <div id="board" class="board">
                <div class="cell n0" onclick="inputResult(0)">0</div>
            </div>
            <textarea id="bulk" placeholder="Paste history here (e.g. 10, 32, 15, 19)..."></textarea>
            <button onclick="importBulk()">Process History</button>
        </div>

        <div class="panel">
            <h3>Calculated Targets</h3>
            <div id="display-container" class="prediction-container">
                <div class="prediction-area" style="border: 1px dashed #444; color: #666;">
                    Waiting for data entry...
                </div>
            </div>
            
            <div id="logicPath" class="log-box">
                Logic trail will appear here after calculation.
            </div>
        </div>
    </div>
</div>

<script>
    const WHEEL = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    let history = [];

    // Initialize UI Board
    const board = document.getElementById('board');
    const rows = [[3,6,9,12,15,18,21,24,27,30,33,36],[2,5,8,11,14,17,20,23,26,29,32,35],[1,4,7,10,13,16,19,22,25,28,31,34]];
    rows.forEach(r => r.forEach(n => {
        board.innerHTML += `<div class="cell ${REDS.includes(n)?'nRed':'nBlack'}" onclick="inputResult(${n})">${n}</div>`;
    }));

    function inputResult(n) {
        history.push(n);
        processLogic(n);
    }

    function importBulk() {
        const val = document.getElementById('bulk').value;
        const nums = val.split(/[ ,]+/).map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        history = [...history, ...nums];
        if(history.length > 0) processLogic(history[history.length-1]);
        document.getElementById('bulk').value = '';
    }

    // Returns 15 numbers (7 left, center, 7 right)
    function getSector15(center) {
        let idx = WHEEL.indexOf(center);
        let sector = [];
        for (let i = -7; i <= 7; i++) {
            sector.push(WHEEL[(idx + i + 37) % 37]);
        }
        return sector;
    }

    function calculateSectorWinRate(sectorNumbers) {
        if (history.length === 0) return 0;
        let wins = history.filter(num => sectorNumbers.includes(num)).length;
        return (wins / history.length) * 100;
    }

    function processLogic(lastNum) {
        // 1. Primary Target Zone: Get the 15 numbers (7+1+7) around the last rolled number
        let primaryZone = getSector15(lastNum);

        // 2. Scan within primary zone for the highest hit percentage 15-number sector center
        let bestPrimaryCenter = primaryZone[0];
        let highestPrimaryWinRate = -1;

        primaryZone.forEach(candidate => {
            let candidateSector = getSector15(candidate);
            let winRate = calculateSectorWinRate(candidateSector);
            if (winRate > highestPrimaryWinRate) {
                highestPrimaryWinRate = winRate;
                bestPrimaryCenter = candidate;
            }
        });
        let finalPrimarySector = getSector15(bestPrimaryCenter);

        // 3. Remaining Scan: Drop the 15 primary numbers to get exactly 22 remaining numbers
        let remainingWheelNumbers = WHEEL.filter(num => !primaryZone.includes(num));

        // 4. Scan only those 22 remaining numbers to find the top 15-number sector setup
        let bestRemainingCenter = remainingWheelNumbers[0];
        let highestRemainingWinRate = -1;

        remainingWheelNumbers.forEach(candidate => {
            let candidateSector = getSector15(candidate);
            let winRate = calculateSectorWinRate(candidateSector);
            if (winRate > highestRemainingWinRate) {
                highestRemainingWinRate = winRate;
                bestRemainingCenter = candidate;
            }
        });
        let finalRemainingSector = getSector15(bestRemainingCenter);

        render(lastNum, bestPrimaryCenter, highestPrimaryWinRate, finalPrimarySector, bestRemainingCenter, highestRemainingWinRate, finalRemainingSector, primaryZone, remainingWheelNumbers.length);
    }

    function render(last, pBest, pRate, pSector, rBest, rRate, rSector, primaryZone, remainingCount) {
        const dispContainer = document.getElementById('display-container');
        const path = document.getElementById('logicPath');

        dispContainer.innerHTML = `
            <div class="prediction-area primary-border">
                <div style="font-size:0.85rem; color:var(--gold); font-weight:bold;">ACTUAL PREDICTION AREA</div>
                <div class="target-num gold-text">${pBest}</div>
                <div style="margin-bottom:10px">Sector Strength: <strong>${pRate.toFixed(1)}%</strong></div>
                <div class="sector-list">${pSector.join(' ')}</div>
            </div>
            
            <div class="prediction-area remaining-border">
                <div style="font-size:0.85rem; color:var(--blue); font-weight:bold;">REMAINING WHEEL PREDICTION</div>
                <div class="target-num blue-text">${rBest}</div>
                <div style="margin-bottom:10px">Sector Strength: <strong>${rRate.toFixed(1)}%</strong></div>
                <div class="sector-list">${rSector.join(' ')}</div>
            </div>
        `;

        path.innerHTML = `
            <strong>Logic Trail:</strong><br>
            • Last Hit: <b>${last}</b> | Base Zone (15 numbers): [ ${primaryZone.join(' ')} ]<br>
            • <b>Actual Prediction:</b> Scanned within base zone. Center <b>${pBest}</b> has highest 15-num sector density (<b>${pRate.toFixed(1)}%</b>).<br>
            • <b>Remaining Wheel Prediction:</b> Excluded base zone, scanned remaining <b>${remainingCount}</b> numbers. Center <b>${rBest}</b> holds highest external 15-num sector density (<b>${rRate.toFixed(1)}%</b>).
        `;
    }
</script>

</body>
</html>
