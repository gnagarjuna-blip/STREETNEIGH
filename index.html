<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Street Bet Tracker</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6;
            --red: #ef4444; --black: #1a1a1a; --green: #10b981; --text: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Betting Board */
        .board-grid { 
            display: grid; 
            grid-template-columns: 50px repeat(12, 1fr); 
            gap: 4px; 
            background: #334155; 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .cell { 
            height: 50px; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.15s; 
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem;
        }
        .cell:hover { transform: scale(1.05); z-index: 5; box-shadow: 0 0 10px white; }
        .num-red { background: var(--red); }
        .num-black { background: var(--black); }
        .num-green { background: var(--green); }
        .zero { grid-row: 1 / span 3; height: auto; }

        /* Dashboard UI */
        .main-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #475569; }
        
        .street-chip { 
            display: inline-block; padding: 6px 12px; background: var(--accent); 
            border-radius: 6px; margin: 4px; font-weight: bold; font-size: 0.85rem;
            animation: slideIn 0.3s ease;
        }
        
        .log-area { 
            height: 200px; overflow-y: auto; background: #000; 
            padding: 10px; font-family: 'Courier New', monospace; 
            font-size: 0.8rem; border-radius: 8px; border: 1px solid #334155;
        }
        .win { color: var(--green); font-weight: bold; }
        .loss { color: var(--red); }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-sync { 
            width: 100%; padding: 12px; background: var(--accent); color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--accent);">Street Bet Reconciler</h1>

    <div class="board-grid" id="board">
        <div class="cell num-green zero" onclick="addNumber(0)">0</div>
        </div>

    <div class="main-layout">
        <div class="left-col">
            <div class="card">
                <h3 style="margin-top:0">Current Bets</h3>
                <div id="bet-display" style="min-height: 40px;">-</div>
                <hr style="border-color:#334155">
                <p>Last Number: <strong id="last-num" style="color:var(--accent)">None</strong></p>
                <p>Rounds Since Win: <span id="win-gap">0</span></p>
            </div>

            <div class="card" style="margin-top:20px">
                <label>Bulk Sync History:</label>
                <textarea id="bulk-data" style="width:100%; height:80px; background:#0f172a; color:white; border:1px solid #334155; border-radius:5px; margin-top:10px; padding:8px;" placeholder="1, 23, 15..."></textarea>
                <button class="btn-sync" onclick="syncBulk()">Sync Data</button>
            </div>
        </div>

        <div class="right-col">
            <div class="card">
                <h3 style="margin-top:0">AI Analysis (Neighbor Scoring)</h3>
                <div id="analysis-log" class="log-area">System Ready. Enter numbers to begin...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Logic Implementation ---
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    let history = [];
    let currentBetStreets = []; // Using Array to preserve LinkedHashSet behavior
    let winGap = 0;

    // Generate Streets (1-36 only per Java logic)
    const streetMap = {};
    for (let i = 0; i < 12; i++) {
        let first = i * 3 + 1;
        let key = `${first}-${first+1}-${first+2}`;
        streetMap[key] = [first, first+1, first+2];
    }

    function initBoard() {
        const board = document.getElementById('board');
        for (let i = 1; i <= 36; i++) {
            const cell = document.createElement('div');
            cell.className = `cell ${reds.includes(i) ? 'num-red' : 'num-black'}`;
            cell.innerText = i;
            cell.onclick = () => addNumber(i);
            // Grid placement (3 rows)
            cell.style.gridRow = 3 - (i - 1) % 3;
            cell.style.gridColumn = Math.floor((i - 1) / 3) + 2;
            board.appendChild(cell);
        }
    }

    function syncBulk() {
        const val = document.getElementById('bulk-data').value;
        const nums = val.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        nums.forEach((n, idx) => {
            // Last number in bulk sync should trigger the win/loss check logic
            processNumber(n, idx === nums.length - 1);
        });
        document.getElementById('bulk-data').value = "";
    }

    function addNumber(n) {
        processNumber(n, true);
    }

    function processNumber(num, checkWinLoss) {
        const log = document.getElementById('analysis-log');
        let win = false;

        // 1. Win/Loss Check (based on previousBetStreets logic)
        if (checkWinLoss && currentBetStreets.length > 0) {
            win = currentBetStreets.some(sKey => streetMap[sKey].includes(num));
        }

        history.push(num);
        document.getElementById('last-num').innerText = num;

        // 2. Neighbor Logic
        const neighbors = [];
        for (let i = 0; i < history.length; i++) {
            if (history[i] === num) {
                if (i > 0) neighbors.push(history[i - 1]);
                if (i < history.length - 1) neighbors.push(history[i + 1]);
            }
        }

        // 3. Scoring Streets
        const neighborFreq = {};
        neighbors.forEach(n => neighborFreq[n] = (neighborFreq[n] || 0) + 1);

        const streetScores = [];
        Object.keys(streetMap).forEach(key => {
            const sum = streetMap[key].reduce((acc, val) => acc + (neighborFreq[val] || 0), 0);
            if (sum > 0) streetScores.push({ key, score: sum });
        });

        // Sort descending by score
        streetScores.sort((a, b) => b.score - a.score);
        const sortedKeys = streetScores.map(s => s.key);

        // 4. Update Betting Strategy
        if (win) {
            winGap = 0;
            currentBetStreets = [];
            if (sortedKeys.length > 0) currentBetStreets.push(sortedKeys[0]);
            log.innerHTML = `<div class="win">✅ WIN! Result ${num} matched current bets.</div>` + log.innerHTML;
        } else if (checkWinLoss) {
            winGap++;
            if (currentBetStreets.length === 0) {
                if (sortedKeys.length > 0) currentBetStreets.push(sortedKeys[0]);
            } else {
                // Add one new recommended street not already present
                const nextStreet = sortedKeys.find(k => !currentBetStreets.includes(k));
                if (nextStreet) currentBetStreets.push(nextStreet);
            }
            log.innerHTML = `<div class="loss">Loss. Result ${num}. Strategy expanded.</div>` + log.innerHTML;
        }

        updateUI(sortedKeys);
    }

    function updateUI(recommendations) {
        document.getElementById('win-gap').innerText = winGap;
        const betDisp = document.getElementById('bet-display');
        
        if (currentBetStreets.length === 0) {
            betDisp.innerText = "-";
        } else {
            betDisp.innerHTML = currentBetStreets.map(s => `<span class="street-chip">${s}</span>`).join('');
        }
    }

    initBoard();
</script>

</body>
</html>
