<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FoN Roulette Pro - DS Predictor</title>
    <style>
        :root { --win-green: #27ae60; --loss-red: #c0392b; --table-dark: #1b1b1b; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 95%; max-width: 900px; padding: 20px; }
        
        /* Layout Sections */
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .section { background: #252525; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); flex: 1; min-width: 300px; }

        /* Roulette Table */
        .roulette-table { display: grid; grid-template-columns: 50px repeat(12, 1fr); grid-template-rows: repeat(3, 40px); gap: 2px; background: #444; border: 2px solid #444; margin-top: 10px; }
        .cell { display: flex; align-items: center; justify-content: center; background: #0a4d28; cursor: pointer; font-weight: bold; font-size: 0.9em; user-select: none; }
        .cell:hover { filter: brightness(1.3); }
        .zero { grid-row: 1 / span 3; background: #27ae60; }
        .red { background: #b92b27; }
        .black { background: #1a1a1a; }

        /* Controls & Input */
        textarea { width: 100%; height: 60px; background: #111; color: #0f0; border: 1px solid #444; padding: 10px; border-radius: 4px; resize: none; font-family: monospace; box-sizing: border-box; }
        button.action-btn { background: #3498db; border: none; padding: 8px 15px; color: white; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        
        /* Stats & Predictions */
        .prediction-val { font-size: 2em; color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }
        .history-box { font-family: monospace; font-size: 0.85em; background: #111; padding: 10px; border-radius: 4px; color: #aaa; max-height: 100px; overflow-y: auto; word-wrap: break-word; }
        .status-tag { padding: 5px 10px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h2>FoN (Faces of Numbers) Strategy Console</h2>

    <div class="section">
        <strong>Import Past Results</strong> (Paste numbers separated by space or comma)
        <textarea id="bulkInput" placeholder="e.g. 13, 2, 7, 19, 36, 1..."></textarea>
        <button class="action-btn" onclick="importHistory()">Sync History</button>
    </div>

    <div class="flex-row">
        <div class="section" style="flex: 2;">
            <strong>Click Number to Play:</strong>
            <div class="roulette-table" id="rouletteTable">
                <div class="cell zero" onclick="inputNumber(0)">0</div>
                </div>
        </div>

        <div class="section">
            <strong>Predictions</strong>
            <div id="statusUI"></div>
            <div id="predictedDS" class="prediction-val">--</div>
            <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
            <strong>History</strong>
            <div class="history-box" id="historyDisplay">Ready...</div>
        </div>
    </div>
</div>

<script>
    // Config: Faces of Numbers and Roulette Data
    const fonMap = {
        0:[5], 1:[6], 2:[7], 3:[8], 4:[9], 5:[0,10,15], 6:[1], 7:[2], 8:[3], 9:[4], 10:[5],
        11:[16,24,29], 12:[17,21,26], 13:[18,31,36], 14:[19], 15:[10], 16:[11], 17:[12,21,26], 18:[13,31,36],
        19:[14], 20:[25], 21:[12,17,26], 22:[27], 23:[28,32], 24:[29], 25:[20], 26:[12,21,17], 27:[22],
        28:[23,32], 29:[24], 30:[35], 31:[18,33,36], 32:[28,23], 33:[33], 34:[34], 35:[30], 36:[13,18,31]
    };
    const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    
    let history = [];
    let currentPredictions = [];

    // Build the Actual Roulette Table (Grid Layout)
    const table = document.getElementById('rouletteTable');
    for (let i = 1; i <= 36; i++) {
        let col = Math.ceil(i / 3);
        let row = 3 - (i % 3);
        if (i % 3 === 0) row = 1;
        
        const cell = document.createElement('div');
        cell.className = `cell ${redNumbers.includes(i) ? 'red' : 'black'}`;
        cell.style.gridColumn = col + 1;
        cell.style.gridRow = row;
        cell.textContent = i;
        cell.onclick = () => inputNumber(i);
        table.appendChild(cell);
    }

    function importHistory() {
        const input = document.getElementById('bulkInput').value;
        const nums = input.split(/[\s,]+/).map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        history = nums;
        document.getElementById('historyDisplay').textContent = history.join(', ');
        alert(`Imported ${nums.length} numbers.`);
    }

    function getDoubleStreet(n) {
        if (n === 0) return null;
        return Math.ceil(n / 6);
    }

    function inputNumber(num) {
        const statusUI = document.getElementById('statusUI');
        
        // 1. Process Win/Loss
        if (currentPredictions.length > 0) {
            const hitDS = getDoubleStreet(num);
            if (currentPredictions.includes(hitDS)) {
                statusUI.innerHTML = `<span class="status-tag" style="background:var(--win-green)">Win! Hits DS ${hitDS}</span>`;
                currentPredictions.shift(); // Remove oldest prediction on win
            } else {
                statusUI.innerHTML = `<span class="status-tag" style="background:var(--loss-red)">Loss! Adding DS</span>`;
            }
        }

        // 2. Search for Neighbors using FoN logic
        history.push(num);
        let equivalents = fonMap[num] || [];
        let targets = [num, ...equivalents];
        let neighbors = [];

        for (let i = 0; i < history.length; i++) {
            if (targets.includes(history[i])) {
                if (i > 0) neighbors.push(history[i-1]);
                if (i < history.length - 1) neighbors.push(history[i+1]);
            }
        }

        // 3. Find Majority DS
        if (neighbors.length > 0) {
            let dsCounts = {};
            neighbors.forEach(n => {
                let ds = getDoubleStreet(n);
                if (ds) dsCounts[ds] = (dsCounts[ds] || 0) + 1;
            });
            
            let bestDS = Object.keys(dsCounts).reduce((a, b) => dsCounts[a] > dsCounts[b] ? a : b, null);
            if (bestDS && !currentPredictions.includes(parseInt(bestDS))) {
                currentPredictions.push(parseInt(bestDS));
            }
        }

        // 4. Update Displays
        document.getElementById('historyDisplay').textContent = history.join(', ');
        document.getElementById('predictedDS').textContent = 
            currentPredictions.length > 0 ? currentPredictions.map(d => `DS ${d}`).join(' + ') : "--";
        
        // Auto-scroll history
        const hb = document.getElementById('historyDisplay');
        hb.scrollTop = hb.scrollHeight;
    }
</script>

</body>
</html>
