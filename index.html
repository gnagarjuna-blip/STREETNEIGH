<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer Signature Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 900px; width: 100%; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h1 { color: #4CAF50; text-align: center; }
        
        .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .wheel-container { position: relative; width: 300px; height: 300px; margin: auto; }
        #wheel-canvas { width: 100%; height: 100%; transform: rotate(-90deg); }
        
        .controls, .stats { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        input { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 80px; }
        button { cursor: pointer; padding: 8px 16px; border: none; border-radius: 4px; background: #4CAF50; color: white; font-weight: bold; }
        button:hover { background: #45a049; }

        .prediction-box { text-align: center; border: 2px solid #4CAF50; padding: 15px; margin-top: 15px; border-radius: 8px; }
        #predicted-number { font-size: 2.5em; font-weight: bold; color: #ffeb3b; display: block; }
        
        .log-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        .log-table th, .log-table td { border-bottom: 1px solid #444; padding: 8px; text-align: center; }
        .win { color: #4CAF50; } .loss { color: #f44336; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dealer Signature Analysis</h1>

    <div class="layout">
        <div>
            <div class="controls">
                <h3>Input Results</h3>
                <p>Enter number (0-36):</p>
                <input type="number" id="numInput" min="0" max="36">
                <button onclick="addNumber()">Add Number</button>
                <button onclick="resetData()" style="background:#f44336">Reset</button>
            </div>

            <div class="stats">
                <h3>Trend Analysis</h3>
                <div id="trendStatus">Waiting for data (Need 3+ results)...</div>
                <div id="avgDist">Avg. Travel Distance: 0</div>
            </div>
        </div>

        <div class="wheel-container">
            <canvas id="wheel-canvas" width="300" height="300"></canvas>
        </div>
    </div>

    <div class="prediction-box">
        <span style="font-size: 1.1em;">Next Predicted Number (Target Pocket)</span>
        <span id="predicted-number">--</span>
        <small id="prediction-reason">Add numbers to start prediction</small>
    </div>

    <h3>History & Distances</h3>
    <table class="log-table">
        <thead>
            <tr>
                <th>Spin #</th>
                <th>Result</th>
                <th>Distance (Pockets)</th>
                <th>Trend</th>
            </tr>
        </thead>
        <tbody id="historyLog"></tbody>
    </table>
</div>

<script>
    // European Roulette Layout
    const wheelNumbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    let history = [];
    let distances = [];

    function drawWheel(highlightNum = null) {
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const centerX = 150;
        const centerY = 150;
        const radius = 130;
        const slice = (Math.PI * 2) / 37;

        ctx.clearRect(0, 0, 300, 300);

        wheelNumbers.forEach((num, i) => {
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, i * slice, (i + 1) * slice);
            
            if (num === highlightNum) ctx.fillStyle = '#ffeb3b';
            else if (num === 0) ctx.fillStyle = '#008000';
            else ctx.fillStyle = [32,19,21,25,34,27,36,30,23,5,16,1,14,9,18,7,12,3].includes(num) ? '#e61919' : '#1a1a1a';
            
            ctx.fill();
            ctx.stroke();

            // Draw text
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(i * slice + slice / 2);
            ctx.fillStyle = num === highlightNum ? 'black' : 'white';
            ctx.font = 'bold 12px Arial';
            ctx.fillText(num, radius - 20, 5);
            ctx.restore();
        });
    }

    function calculateDistance(startNum, endNum) {
        let startIndex = wheelNumbers.indexOf(startNum);
        let endIndex = wheelNumbers.indexOf(endNum);
        // Clockwise distance
        return (endIndex - startIndex + 37) % 37;
    }

    function addNumber() {
        const val = parseInt(document.getElementById('numInput').value);
        if (isNaN(val) || val < 0 || val > 36) return;

        if (history.length > 0) {
            const dist = calculateDistance(history[history.length - 1], val);
            distances.push(dist);
        }
        
        history.push(val);
        updateUI();
        document.getElementById('numInput').value = '';
        drawWheel(val);
    }

    function updateUI() {
        const log = document.getElementById('historyLog');
        log.innerHTML = '';
        
        history.forEach((num, i) => {
            const dist = i === 0 ? '-' : distances[i-1];
            log.innerHTML = `<tr>
                <td>${i+1}</td>
                <td><b>${num}</b></td>
                <td>${dist}</td>
                <td>-</td>
            </tr>` + log.innerHTML;
        });

        if (distances.length >= 2) {
            const avg = distances.reduce((a, b) => a + b, 0) / distances.length;
            document.getElementById('avgDist').innerText = `Avg. Travel Distance: ${avg.toFixed(2)}`;
            
            // Basic Trend Logic (Rising/Dying)
            const last = distances[distances.length - 1];
            const prev = distances[distances.length - 2];
            let trend = "Stable";
            if (last > prev) trend = "Rising Trend";
            if (last < prev) trend = "Dying Trend";
            document.getElementById('trendStatus').innerText = `Current Status: ${trend}`;

            // Predict Next
            const lastNum = history[history.length - 1];
            const lastIdx = wheelNumbers.indexOf(lastNum);
            
            // Adjust prediction based on trend
            let adjustment = 0;
            if (trend === "Rising Trend") adjustment = 1; 
            if (trend === "Dying Trend") adjustment = -1;

            const predictedIdx = (lastIdx + Math.round(avg) + adjustment + 37) % 37;
            const prediction = wheelNumbers[predictedIdx];
            
            document.getElementById('predicted-number').innerText = prediction;
            document.getElementById('prediction-reason').innerText = 
                `Based on ${trend} and Average Distance of ${Math.round(avg)}`;
        }
    }

    function resetData() {
        history = [];
        distances = [];
        document.getElementById('historyLog').innerHTML = '';
        document.getElementById('predicted-number').innerText = '--';
        drawWheel();
    }

    drawWheel();
</script>

</body>
</html>
