<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Proximity Cluster Tracker</title>
    <style>
        :root { --green: #27ae60; --red: #c0392b; --black: #1a1a1a; --gold: #f1c40f; --teal: #008080; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; margin: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; flex: 1; min-width: 350px; }

        /* Board Styling */
        .board { display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px; margin-top: 15px; }
        .cell { height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; 
                font-weight: bold; border-radius: 4px; border: 1px solid #444; user-select: none; }
        .n0 { background: var(--green); grid-row: span 3; }
        .nRed { background: var(--red); }
        .nBlack { background: var(--black); }

        /* Prediction Styling */
        .prediction-area { background: linear-gradient(145deg, #112222, #0d1414); border: 2px solid var(--gold); 
                           padding: 20px; border-radius: 15px; text-align: center; margin-top: 10px; }
        .target-num { font-size: 4rem; color: var(--gold); font-weight: 900; line-height: 1; margin: 10px 0; }
        .sector-list { color: #888; font-family: monospace; word-spacing: 5px; background: #000; padding: 10px; border-radius: 5px; font-size: 0.9rem; }
        
        /* Streak Styling */
        .streak-container { margin-bottom: 15px; display: flex; justify-content: center; gap: 5px; }
        .streak-item { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .win { background: var(--green); color: white; }
        .loss { background: var(--red); color: white; }

        textarea { width: 100%; height: 60px; background: #000; color: var(--green); border: 1px solid #444; margin-top: 10px; padding: 5px; font-family: monospace; resize: none; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #333; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #444; }

        .log-box { font-size: 0.8rem; color: #aaa; background: #111; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 3px solid var(--teal); }
        
        /* Tracking Log Display Elements */
        .recent-display-container { margin-top: 15px; background: #111; padding: 12px; border-radius: 6px; border: 1px solid #2a2a2a; }
        .recent-display-title { font-size: 0.85rem; color: #888; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .recent-chips-wrapper { display: flex; gap: 6px; flex-wrap: wrap; }
        .recent-chip { min-width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--gold);">Dynamic Neighbor Cluster Tracker (Reactive Mode)</h2>

    <div class="flex-row">
        <div class="panel">
            <h3>Add Last Result</h3>
            <div id="board" class="board">
                <div class="cell n0" onclick="inputResult(0)">0</div>
            </div>

            <textarea id="bulk" placeholder="Paste history here (Top is latest, e.g. 23, 10, 5)..."></textarea>
            <button onclick="importBulk()">Extract & Analyze Neighbors</button>
            
            <div class="recent-display-container">
                <div class="recent-display-title">Latest 10 Results (Newest → Oldest)</div>
                <div id="recentChips" class="recent-chips-wrapper">
                    <span style="color:#666; font-size:0.85rem; font-style:italic;">No spins recorded yet</span>
                </div>
            </div>
            <button onclick="clearTracker()" style="background: var(--red); margin-top: 15px;">Reset Data Streams</button>
        </div>

        <div class="panel">
            <h3>Reactive Proximity Target Sector</h3>
            <div id="display" class="prediction-area">
                <p>Awaiting data to collect spatial left/right distributions...</p>
            </div>
            
            <div id="logicPath" class="log-box">
                Proximity calculations and neighbor gathering paths will list here.
            </div>
        </div>
    </div>
</div>

<script>
    const WHEEL = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    
    // Kept tight at 50 to maximize fast-shifting responsiveness
    const MAX_ROLLING_HISTORY = 50; 
    const MAX_STREAKS = 10;         

    let history = []; 
    let streaks = []; 
    let lastPredictedSector = [];

    // Build UI Input Board
    const board = document.getElementById('board');
    const rows = [[3,6,9,12,15,18,21,24,27,30,33,36],[2,5,8,11,14,17,20,23,26,29,32,35],[1,4,7,10,13,16,19,22,25,28,31,34]];
    rows.forEach(r => r.forEach(n => {
        board.innerHTML += `<div class="cell ${REDS.includes(n)?'nRed':'nBlack'}" onclick="inputResult(${n})">${n}</div>`;
    }));

    function inputResult(n) {
        checkWinLoss(n);
        history.unshift(n); 
        
        if (history.length > MAX_ROLLING_HISTORY) {
            history.pop();
        }

        updateRecentChipsDisplay();
        calculateProximityDensity();
    }

    function importBulk() {
        const val = document.getElementById('bulk').value;
        const nums = val.split(/[ ,]+/).map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        
        if (nums.length === 0) return;

        for (let i = nums.length - 1; i >= 0; i--) {
            const n = nums[i];
            checkWinLoss(n);
            history.unshift(n);
            
            if (history.length > MAX_ROLLING_HISTORY) {
                history.pop();
            }
        }
        
        updateRecentChipsDisplay();
        calculateProximityDensity();
        document.getElementById('bulk').value = '';
    }

    function checkWinLoss(newNum) {
        if (lastPredictedSector.length > 0) {
            const isWin = lastPredictedSector.includes(newNum);
            streaks.push(isWin ? "W" : "L");
            if (streaks.length > MAX_STREAKS) streaks.shift(); 
        }
    }

    function getSector(center) {
        let idx = WHEEL.indexOf(center);
        let sector = [];
        for (let i = -7; i <= 7; i++) {
            sector.push(WHEEL[(idx + i + 37) % 37]);
        }
        return sector;
    }

    // --- RE-ENGINEERED HIGHLY REACTIVE NEIGHBOR CALCULATION LOOP ---
    function calculateProximityDensity() {
        if (history.length === 0) return;

        // Create a clear frequency counter map for all 37 pockets
        let frequencyMap = {};
        WHEEL.forEach(num => frequencyMap[num] = 0);

        // 1. Map out the immediate physical left and right neighbors for every instance inside the history pool
        history.forEach(num => {
            let wheelIdx = WHEEL.indexOf(num);
            if (wheelIdx !== -1) {
                let leftNeighbor = WHEEL[(wheelIdx - 1 + 37) % 37];
                let rightNeighbor = WHEEL[(wheelIdx + 1) % 37];
                
                // Track cumulative hits for these exact pockets
                frequencyMap[leftNeighbor]++;
                frequencyMap[rightNeighbor]++;
            }
        });

        let bestCenterNumber = WHEEL[0];
        let maxClusterWeight = -1;
        let finalSectorBreakdown = [];

        // 2. Scan every wheel pocket to find whose 7-neighbor zone holds the highest accumulated frequency weight
        WHEEL.forEach(candidateNum => {
            let candidateSector = getSector(candidateNum);
            let totalSectorScore = 0;
            let activelyContributing = [];

            candidateSector.forEach(sectorNum => {
                let count = frequencyMap[sectorNum] || 0;
                totalSectorScore += count;
                
                if (count > 0 && !activelyContributing.includes(sectorNum)) {
                    activelyContributing.push(sectorNum);
                }
            });

            // Forces selection to alter immediately if a localized cluster takes over weight density
            if (totalSectorScore > maxClusterWeight) {
                maxClusterWeight = totalSectorScore;
                bestCenterNumber = candidateNum;
                finalSectorBreakdown = activelyContributing;
            }
        });

        // 3. Assign target output boundaries
        let finalPredictionSector = getSector(bestCenterNumber);
        lastPredictedSector = finalPredictionSector;

        renderProximityMetrics(history[0], bestCenterNumber, maxClusterWeight, finalSectorBreakdown, finalPredictionSector);
    }

    function updateRecentChipsDisplay() {
        const wrapper = document.getElementById('recentChips');
        if (history.length === 0) {
            wrapper.innerHTML = `<span style="color:#666; font-size:0.85rem; font-style:italic;">No spins recorded yet</span>`;
            return;
        }

        const latest10 = history.slice(0, 10);
        let htmlStr = "";
        latest10.forEach(num => {
            let bgColor = "var(--black)";
            if (num === 0) bgColor = "var(--green)";
            else if (REDS.includes(num)) bgColor = "var(--red)";
            htmlStr += `<span class="recent-chip" style="background:${bgColor};">${num}</span>`;
        });
        wrapper.innerHTML = htmlStr;
    }

    function clearTracker() {
        history = []; streaks = []; lastPredictedSector = [];
        document.getElementById('display').innerHTML = `<p>Awaiting data to collect spatial left/right distributions...</p>`;
        document.getElementById('logicPath').innerHTML = `Proximity calculations and neighbor gathering paths will list here.`;
        updateRecentChipsDisplay();
    }

    function renderProximityMetrics(last, best, totalScore, hotSubGroup, sector) {
        const disp = document.getElementById('display');
        const path = document.getElementById('logicPath');

        let streakHtml = `<div class="streak-container">`;
        streaks.forEach(s => {
            streakHtml += `<span class="streak-item ${s === 'W' ? 'win' : 'loss'}">${s}</span>`;
        });
        streakHtml += `</div>`;

        disp.innerHTML = `
            ${streakHtml}
            <div style="font-size:0.85rem; color:var(--teal); font-weight:bold; letter-spacing:1px; margin-bottom:5px;">
                NEIGHBOR CONCENTRATION BALANCED
            </div>
            <div style="font-size:0.9rem; color:var(--gold)">PREDICTED HIGHEST CLUSTER CENTER</div>
            <div class="target-num">${best}</div>
            <div style="margin-bottom:10px">Cluster Overlap Density Weight: <strong>${totalScore} Points</strong></div>
            <div class="sector-list">${sector.join(' ')}</div>
        `;

        path.innerHTML = `
            <strong>Dynamic Proximity Overlap Trail:</strong><br>
            • Latest Live Entry: <b>${last}</b><br>
            • Real-Time Recalculation Loop executed successfully.<br>
            • Dense Pocket Cluster found: <b>[${hotSubGroup.sort((a,b)=>WHEEL.indexOf(a)-WHEEL.indexOf(b)).join(', ')}]</b>.<br>
            • Optimal Alignment Choice: Target sector center <b>${best}</b> currently shifts to encapsulate maximum proximity points.<br>
            • <b>Instruction:</b> Run ${best} with its 7 left and right wheel neighbors.
        `;
    }
</script>

</body>
</html>
