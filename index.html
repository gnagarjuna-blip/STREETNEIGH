<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FoN Double Street Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #2d2d2d; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 700px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 20px 0; }
        button { padding: 12px; border: none; border-radius: 6px; background: #444; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #666; transform: translateY(-2px); }
        .btn-0 { grid-column: span 3; background: #27ae60; }
        .prediction-box { background: #3d3d3d; border-left: 5px solid #f1c40f; padding: 15px; margin: 15px 0; border-radius: 4px; }
        .prediction-val { font-size: 1.4em; color: #f1c40f; }
        .history-list { font-size: 0.9em; color: #888; background: #222; padding: 10px; border-radius: 5px; height: 40px; overflow-x: auto; white-space: nowrap; }
        .win { color: #2ecc71; font-weight: bold; }
        .loss { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Roulette FoN DS Predictor</h2>
    
    <div class="grid">
        <button class="btn-0" onclick="inputNumber(0)">0</button>
        <script>
            for(let i=1; i<=36; i++) {
                document.write(`<button onclick="inputNumber(${i})">${i}</button>`);
            }
        </script>
    </div>

    <div class="prediction-box">
        <div><strong>Current Predictions:</strong></div>
        <div id="predictedDS" class="prediction-val">Waiting for data...</div>
        <div id="resultMsg" style="margin-top:10px"></div>
    </div>

    <div class="history-list" id="historyDisplay">History: </div>
</div>

<script>
    // Mapping from your "Faces of Numbers" attachment
    const fonMap = {
        0:[5], 1:[6], 2:[7], 3:[8], 4:[9], 5:[0,10,15], 6:[1], 7:[2], 8:[3], 9:[4], 10:[5],
        11:[16,24,29], 12:[17,21,26], 13:[18,31,36], 14:[19], 15:[10], 16:[11], 17:[12,21,26], 18:[13,31,36],
        19:[14], 20:[25], 21:[12,17,26], 22:[27], 23:[28,32], 24:[29], 25:[20], 26:[12,21,17], 27:[22],
        28:[23,32], 29:[24], 30:[35], 31:[18,33,36], 32:[28,23], 33:[33], 34:[34], 35:[30], 36:[13,18,31]
    };

    let history = [];
    let currentPredictions = []; // Array of predicted Double Streets

    function getDoubleStreet(n) {
        if (n === 0) return null;
        return Math.ceil(n / 6);
    }

    function inputNumber(num) {
        let resultMsg = document.getElementById('resultMsg');
        
        // 1. Check Win/Loss of existing predictions
        if (currentPredictions.length > 0) {
            const hitDS = getDoubleStreet(num);
            if (currentPredictions.includes(hitDS)) {
                resultMsg.innerHTML = `<span class="win">WIN! Number ${num} hit DS ${hitDS}</span>`;
                // Logic: "Reset one double street" - removing the oldest one
                currentPredictions.shift();
            } else {
                resultMsg.innerHTML = `<span class="loss">LOSS! Number ${num} missed. Adding DS.</span>`;
            }
        }

        // 2. Update History
        history.push(num);
        document.getElementById('historyDisplay').textContent = "History: " + history.join(', ');

        // 3. Collect neighbors of clicked number AND its equivalents
        let equivalents = fonMap[num] || [];
        let targets = [num, ...equivalents];
        let collectedNeighbors = [];

        for (let i = 0; i < history.length; i++) {
            if (targets.includes(history[i])) {
                if (i > 0) collectedNeighbors.push(history[i-1]);
                if (i < history.length - 1) collectedNeighbors.push(history[i+1]);
            }
        }

        // 4. Find Majority DS among neighbors
        if (collectedNeighbors.length > 0) {
            let dsFrequency = {};
            collectedNeighbors.forEach(n => {
                let ds = getDoubleStreet(n);
                if (ds) dsFrequency[ds] = (dsFrequency[ds] || 0) + 1;
            });

            let bestDS = null;
            let maxCount = -1;
            for (let ds in dsFrequency) {
                if (dsFrequency[ds] > maxCount) {
                    maxCount = dsFrequency[ds];
                    bestDS = parseInt(ds);
                }
            }

            // Add the new predicted DS if not already in list
            if (bestDS && !currentPredictions.includes(bestDS)) {
                currentPredictions.push(bestDS);
            }
        }

        // 5. Update UI
        updateUI();
    }

    function updateUI() {
        const display = document.getElementById('predictedDS');
        if (currentPredictions.length === 0) {
            display.textContent = "Waiting for next prediction...";
        } else {
            display.textContent = currentPredictions.map(ds => `DS ${ds}`).join(' + ');
        }
    }
</script>

</body>
</html>
